name: native_torch
description: "A Flutter plugin for controlling torch/flashlight functionality with native platform integration. Supports turning torch on/off, toggling, and adjusting intensity."
version: 0.0.3
homepage: https://github.com/oyaei/native_torch
repository: https://github.com/oyaei/native_torch
issue_tracker: https://github.com/oyaei/native_torch/issues

environment:
  sdk: ^3.11.5
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.oyaiz.packages.native_torch
        pluginClass: NativeTorchPlugin
      ios:
        pluginClass: NativeTorchPlugin

